name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust (fmt, clippy, test, deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain 1.89
        uses: dtolnay/rust-toolchain@1.89
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: cargo-deny check
        run: cargo deny check

  wasm:
    name: WASM (wasm-pack test, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain 1.89
        uses: dtolnay/rust-toolchain@1.89
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: wasm-pack test (node)
        run: wasm-pack test --node crates/wasm

      - name: Build wasm for web target
        run: bash scripts/build-wasm.sh

  ts:
    name: TypeScript (check, test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The TS typecheck and tests import the built wasm from ts/view/wasm/,
      # so the wasm must be compiled before bun runs check/test.
      - name: Install Rust toolchain 1.89
        uses: dtolnay/rust-toolchain@1.89
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0

      - name: Build wasm for web target
        run: bash scripts/build-wasm.sh

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run check

      - name: Test
        run: bun run test

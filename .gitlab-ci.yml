# GitLab CI for Vellum (private dev origin: gitlab.akaisys.com/nexum/vellum).
# Mirrors the GitHub Actions pipeline, then pushes to the GitHub mirror
# (TensegrityAI/vellum) via a dedicated deploy key on the default branch.
#
# NOTE: the `test` job installs the full toolchain (node, bun, wasm-pack, cargo-deny)
# on each cache-cold run. A prebuilt CI image is a worthwhile future optimization.

stages:
  - test
  - mirror

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  CARGO_TERM_COLOR: "always"

test:
  stage: test
  image: rust:1.89-bookworm
  cache:
    key: "cargo-$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/registry/
      - .cargo/bin/
      - target/
  before_script:
    - export PATH="$CARGO_HOME/bin:$PATH"
    - rustup component add clippy rustfmt
    - rustup target add wasm32-unknown-unknown
    - apt-get update && apt-get install -y --no-install-recommends curl ca-certificates unzip
    # Node (needed by `wasm-pack test --node`)
    - curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    - apt-get install -y nodejs
    # Bun
    - curl -fsSL https://bun.sh/install | bash
    - export BUN_INSTALL="$HOME/.bun" && export PATH="$BUN_INSTALL/bin:$PATH"
    # wasm-pack + cargo-deny as PREBUILT binaries via cargo-binstall.
    # Compiling them from source breaks: their latest releases need a rustc newer
    # than our pinned 1.89 (rust-toolchain.toml). Prebuilt binaries run regardless.
    # Cached in .cargo/bin between runs.
    - |
      if ! command -v cargo-binstall >/dev/null; then
        curl -L --proto '=https' --tlsv1.2 -sSf \
          https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      fi
    - command -v wasm-pack >/dev/null || cargo binstall -y wasm-pack
    - command -v cargo-deny >/dev/null || cargo binstall -y cargo-deny
  script:
    - cargo fmt --all -- --check
    - cargo clippy --all-targets -- -D warnings
    - cargo test
    - cargo deny check
    - bash scripts/build-wasm.sh
    - wasm-pack test --node crates/wasm
    - export PATH="$HOME/.bun/bin:$PATH"
    - bun install
    - bun run check
    - bun run test

# Push to the GitHub mirror using the deploy key (write). The private key is
# stored base64-encoded in the protected CI/CD variable GITHUB_MIRROR_SSH_KEY_B64
# (base64 avoids the newline/encoding corruption that breaks raw SSH keys in CI).
mirror:
  stage: mirror
  image: alpine:3.20
  needs: ["test"]
  variables:
    GIT_DEPTH: "0" # full history + tags for a complete mirror
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache git openssh-client
  script:
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$GITHUB_MIRROR_SSH_KEY_B64" | base64 -d > ~/.ssh/id_ed25519
    - chmod 600 ~/.ssh/id_ed25519
    - ssh-keygen -y -f ~/.ssh/id_ed25519 >/dev/null # fail fast if the key is malformed
    - ssh-keyscan -t ed25519,rsa github.com >> ~/.ssh/known_hosts 2>/dev/null
    - git remote remove github 2>/dev/null || true
    - git remote add github git@github.com:TensegrityAI/vellum.git
    - git push github "HEAD:refs/heads/$CI_DEFAULT_BRANCH"
    - git push github --tags

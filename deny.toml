[advisories]
yanked = "deny"

[licenses]
# Unicode-3.0 is REQUIRED: `unicode-ident` (pulled transitively via `proc-macro2`
# in the proc-macro/derive build graph) is licensed `(MIT OR Apache-2.0) AND
# Unicode-3.0`. Removing this allowance fails `cargo deny check`. Do not "clean
# it up" — it is load-bearing, not stale.
allow = ["Apache-2.0", "MIT", "BSD-3-Clause", "BSD-2-Clause", "ISC", "Unicode-3.0"]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Workspace-internal crates are referenced by path without a version requirement,
# which cargo-deny otherwise flags as a wildcard. Exempt path deps from that rule.
allow-wildcard-paths = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
